name: Deploy Pipeline

on:
  push:
    branches: [dev, main]
  workflow_dispatch:

env:
  GCP_PROJECT: josiam
  GCP_REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/josiam/josi

permissions:
  contents: read
  id-token: write

jobs:
  # ─── Step 1: Detect what changed ───
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infra/**'
            api:
              - 'src/**'
              - 'tests/**'
              - 'Dockerfile'
              - 'pyproject.toml'
              - 'poetry.lock'
              - 'alembic.ini'
            web:
              - 'web/**'

      - name: Set environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

  # ─── Step 2: Infrastructure (Pulumi) ───
  infra:
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.detect-changes.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: pulumi/actions@v6
        with:
          command: up
          stack-name: govindnewform/${{ needs.detect-changes.outputs.environment }}
          work-dir: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  # ─── Step 3: API — Build, Test, Deploy ───
  api:
    needs: [detect-changes, infra]
    if: |
      always() &&
      needs.detect-changes.outputs.api == 'true' &&
      (needs.infra.result == 'success' || needs.infra.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ needs.detect-changes.outputs.environment }}
    env:
      ENV: ${{ needs.detect-changes.outputs.environment }}
      IMAGE: us-central1-docker.pkg.dev/josiam/josi/josi-api
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build API image
        run: |
          docker build \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:$ENV-latest \
            .

      - name: Start test database
        run: |
          docker run -d --name test-db \
            -e POSTGRES_USER=josi \
            -e POSTGRES_PASSWORD=josi \
            -e POSTGRES_DB=josi_test \
            pgvector/pgvector:pg16

          # Wait for DB to be ready
          for i in $(seq 1 30); do
            docker exec test-db pg_isready -U josi && break
            echo "Waiting for database..."
            sleep 2
          done

      - name: Run migrations
        run: |
          docker run --rm \
            --link test-db \
            -e DATABASE_URL=postgresql+asyncpg://josi:josi@test-db:5432/josi_test \
            -e ENVIRONMENT=test \
            $IMAGE:${{ github.sha }} \
            alembic upgrade head

      - name: Run tests
        run: |
          docker run --rm \
            --link test-db \
            -e DATABASE_URL=postgresql+asyncpg://josi:josi@test-db:5432/josi_test \
            -e REDIS_URL= \
            -e ENVIRONMENT=test \
            -e RATE_LIMIT_ENABLED=false \
            -e EPHEMERIS_PATH=/usr/share/swisseph \
            $IMAGE:${{ github.sha }} \
            pytest tests/ -v --tb=short

      - name: Push image to Artifact Registry
        run: |
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:$ENV-latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy josi-api-$ENV \
            --image=$IMAGE:${{ github.sha }} \
            --region=$GCP_REGION \
            --project=$GCP_PROJECT \
            --platform=managed \
            --allow-unauthenticated \
            --service-account=josi-$ENV@$GCP_PROJECT.iam.gserviceaccount.com \
            --add-cloudsql-instances=$GCP_PROJECT:$GCP_REGION:josiam-$ENV \
            --set-secrets="\
              AUTH_PROVIDER=josiam-auth-provider-$ENV:latest,\
              CLERK_SECRET_KEY=josiam-clerk-secret-key-$ENV:latest,\
              CLERK_WEBHOOK_SECRET=josiam-clerk-webhook-secret-$ENV:latest,\
              DESCOPE_PROJECT_ID=josiam-descope-project-id-$ENV:latest,\
              DESCOPE_WEBHOOK_SECRET=josiam-descope-webhook-secret-$ENV:latest" \
            --set-env-vars="\
              ENVIRONMENT=$ENV,\
              AUTO_DB_MIGRATION=true,\
              EPHEMERIS_PATH=/usr/share/swisseph,\
              CORS_ORIGINS=*,\
              LOG_LEVEL=$([ "$ENV" = "prod" ] && echo "INFO" || echo "DEBUG"),\
              RATE_LIMIT_ENABLED=true,\
              DATABASE_URL=postgresql+asyncpg://josi@/josi?host=/cloudsql/$GCP_PROJECT:$GCP_REGION:josiam-$ENV" \
            --min-instances=$([ "$ENV" = "prod" ] && echo "1" || echo "0") \
            --max-instances=$([ "$ENV" = "prod" ] && echo "10" || echo "3") \
            --memory=$([ "$ENV" = "prod" ] && echo "2Gi" || echo "512Mi") \
            --cpu=$([ "$ENV" = "prod" ] && echo "2" || echo "1") \
            --timeout=300 \
            --port=8000 \
            --execution-environment=gen2

      - name: Cleanup test database
        if: always()
        run: docker rm -f test-db || true

  # ─── Step 4: Web — Build, Deploy ───
  web:
    needs: [detect-changes, infra, api]
    if: |
      always() &&
      needs.detect-changes.outputs.web == 'true' &&
      (needs.infra.result == 'success' || needs.infra.result == 'skipped') &&
      (needs.api.result == 'success' || needs.api.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ needs.detect-changes.outputs.environment }}
    env:
      ENV: ${{ needs.detect-changes.outputs.environment }}
      IMAGE: us-central1-docker.pkg.dev/josiam/josi/josi-web
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Get API URL
        id: api-url
        run: |
          API_URL=$(gcloud run services describe josi-api-$ENV \
            --region=$GCP_REGION \
            --project=$GCP_PROJECT \
            --format='value(status.url)' 2>/dev/null || echo "")
          echo "url=$API_URL" >> $GITHUB_OUTPUT

      - name: Build Web image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.api-url.outputs.url }} \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:$ENV-latest \
            web/

      - name: Push image to Artifact Registry
        run: |
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:$ENV-latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy josi-web-$ENV \
            --image=$IMAGE:${{ github.sha }} \
            --region=$GCP_REGION \
            --project=$GCP_PROJECT \
            --platform=managed \
            --allow-unauthenticated \
            --service-account=josi-$ENV@$GCP_PROJECT.iam.gserviceaccount.com \
            --set-secrets="\
              NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=josiam-clerk-publishable-key-$ENV:latest" \
            --set-env-vars="\
              NODE_ENV=production,\
              NEXT_PUBLIC_API_URL=${{ steps.api-url.outputs.url }},\
              API_URL=${{ steps.api-url.outputs.url }}" \
            --min-instances=$([ "$ENV" = "prod" ] && echo "1" || echo "0") \
            --max-instances=$([ "$ENV" = "prod" ] && echo "10" || echo "3") \
            --memory=512Mi \
            --cpu=1 \
            --timeout=60 \
            --port=3000 \
            --execution-environment=gen2
