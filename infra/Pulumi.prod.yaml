config:
  gcp:project: josiam
  gcp:region: us-central1
  josi:environment: prod
  josi:branch_pattern: "^main$"
  # Database
  josi:db_tier: "db-custom-1-3840"
  josi:db_edition: "ENTERPRISE"
  josi:db_version: "POSTGRES_17"
  josi:db_disk_size: "10"
  josi:db_availability: "ZONAL"
  josi:db_deletion_protection: "true"
  # Cloud Run - API
  josi:api_memory: "2Gi"
  josi:api_cpu: "2"
  josi:api_min_instances: "1"
  josi:api_max_instances: "10"
  # Cloud Run - Web
  josi:web_memory: "512Mi"
  josi:web_cpu: "1"
  josi:web_min_instances: "1"
  josi:web_max_instances: "10"
  # Storage
  josi:bucket_location: "us-central1"
  # Domains
  josi:api_domain: "api.josiam.com"
  josi:web_domain: "josiam.com"
  josi:www_redirect: "true"
