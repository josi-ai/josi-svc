apiVersion: v1
kind: Secret
metadata:
  name: josi-secret
  namespace: josi
type: Opaque
stringData:
  # These values should be replaced with actual base64 encoded values
  # Use: echo -n 'your-value' | base64
  SECRET_KEY: "your-secret-key-here"
  DATABASE_URL: "postgresql://josi:password@cloudsql-proxy:5432/josi"
  REDIS_URL: "redis://redis-service:6379/0"