apiVersion: v1
kind: ServiceAccount
metadata:
  name: josi-sa
  namespace: josi
  annotations:
    iam.gke.io/gcp-service-account: josi-sa@PROJECT_ID.iam.gserviceaccount.com
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: josi-role
  namespace: josi
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: josi-rolebinding
  namespace: josi
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: josi-role
subjects:
- kind: ServiceAccount
  name: josi-sa
  namespace: josi