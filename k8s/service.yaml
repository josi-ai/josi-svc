apiVersion: v1
kind: Service
metadata:
  name: josi-api-service
  namespace: josi
  labels:
    app: josi-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: josi-api
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: josi
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
    name: redis
  selector:
    app: redis