version: '3.8'

services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: josi
      POSTGRES_PASSWORD: josi
      POSTGRES_DB: josi_test
    ports:
      - "5433:5432"  # Different port to avoid conflicts
    volumes:
      - ./src/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U josi"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c shared_buffers=256MB
      -c max_connections=200

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      DATABASE_URL: postgresql+asyncpg://josi:josi@test-db:5432/josi_test
      ENVIRONMENT: test
      AUTO_DB_MIGRATION: "false"
      SECRET_KEY: test-secret-key-for-testing
      APP_NAME: "Josi API Test"
      APP_VERSION: "test"
      DEBUG: "true"
      LOG_LEVEL: DEBUG
      CORS_ORIGINS: '["*"]'
      CORS_ALLOW_CREDENTIALS: "true"
      CORS_ALLOW_METHODS: '["*"]'
      CORS_ALLOW_HEADERS: '["*"]'
      EPHEMERIS_PATH: /usr/share/swisseph
      RATE_LIMIT_ENABLED: "false"
      API_KEY_HEADER: X-API-Key
    depends_on:
      test-db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./alembic.ini:/app/alembic.ini
      - ./pytest.ini:/app/pytest.ini
      - ./coverage:/app/coverage
    command: >
      sh -c "
        echo 'Running database migrations...' &&
        poetry run alembic upgrade head &&
        echo 'Running tests...' &&
        poetry run pytest tests/unit -v --cov=src/josi --cov-report=term-missing --cov-report=html
      "
