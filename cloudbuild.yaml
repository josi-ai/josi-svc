# Cloud Build configuration for Josi API
# Deploys to Cloud Run on push to main branch
#
# Pipeline: Build → Start test DB → Wait → Migrate → Test → Push → Deploy → Cleanup
# Tests must pass before the image is pushed or deployed.
#
# Required secrets in Secret Manager:
# - josi-secret-key: Application secret key
# - josi-database-url: Cloud SQL connection string
# - josi-redis-url: Redis connection string
#
# Trigger setup:
# - Source: GitHub repo
# - Branch: ^main$
# - Build config: cloudbuild.yaml

substitutions:
  _REGION: us-central1
  _IMAGE_NAME: josi-api
  _SERVICE_NAME: josi-api
  _ARTIFACT_REGISTRY: us-central1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy
  _ENVIRONMENT: production
  _TAG: ${SHORT_SHA}
  _APP_NAME: Josi API
  _SA_EMAIL: josi-sa@${PROJECT_ID}.iam.gserviceaccount.com
  _SECRET_KEY: josi-secret-key
  _DATABASE_URL: josi-database-url
  _REDIS_URL: josi-redis-url
  _CORS_ORIGINS: "*"
  _LOG_LEVEL: INFO

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE

steps:
  # Step 1: Build the production Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - '${_ARTIFACT_REGISTRY}/${_IMAGE_NAME}:${_TAG}'
      - '-t'
      - '${_ARTIFACT_REGISTRY}/${_IMAGE_NAME}:latest'
      - '.'

  # Step 2: Start test database container (sidecar on cloudbuild network)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'start-test-db'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        docker rm -f test-db 2>/dev/null || true
        docker run -d --rm \
          --name=test-db \
          --network=cloudbuild \
          -e POSTGRES_USER=josi \
          -e POSTGRES_PASSWORD=josi \
          -e POSTGRES_DB=josi_test \
          pgvector/pgvector:pg16
    waitFor: ['-']

  # Step 3: Wait for database to be ready
  - name: 'gcr.io/cloud-builders/docker'
    id: 'wait-for-db'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        for i in $(seq 1 30); do
          docker exec test-db pg_isready -U josi && exit 0
          echo "Waiting for database..."
          sleep 2
        done
        echo "Database failed to start"
        exit 1
    waitFor: ['start-test-db']

  # Step 4: Run Alembic migrations against test DB
  - name: 'gcr.io/cloud-builders/docker'
    id: 'migrate'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        docker run --rm \
          --network cloudbuild \
          -e DATABASE_URL=postgresql+asyncpg://josi:josi@test-db:5432/josi_test \
          -e ENVIRONMENT=test \
          ${_ARTIFACT_REGISTRY}/${_IMAGE_NAME}:${_TAG} \
          alembic upgrade head
    waitFor: ['build', 'wait-for-db']

  # Step 5: Run tests (must pass before push/deploy)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'test'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        docker run --rm \
          --network cloudbuild \
          -e DATABASE_URL=postgresql+asyncpg://josi:josi@test-db:5432/josi_test \
          -e REDIS_URL= \
          -e ENVIRONMENT=test \
          -e RATE_LIMIT_ENABLED=false \
          -e EPHEMERIS_PATH=/usr/share/swisseph \
          ${_ARTIFACT_REGISTRY}/${_IMAGE_NAME}:${_TAG} \
          pytest tests/ -v --tb=short
    waitFor: ['migrate']

  # Step 6: Push image to Artifact Registry (only if tests pass)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '--all-tags'
      - '${_ARTIFACT_REGISTRY}/${_IMAGE_NAME}'
    waitFor: ['test']

  # Step 7: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_ARTIFACT_REGISTRY}/${_IMAGE_NAME}:${_TAG}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--service-account=${_SA_EMAIL}'
      - '--set-secrets=SECRET_KEY=${_SECRET_KEY}:latest,DATABASE_URL=${_DATABASE_URL}:latest,REDIS_URL=${_REDIS_URL}:latest'
      - '--set-env-vars=APP_NAME=${_APP_NAME},APP_VERSION=${_TAG},ENVIRONMENT=${_ENVIRONMENT},AUTO_DB_MIGRATION=true,EPHEMERIS_PATH=/usr/share/swisseph,CORS_ORIGINS=${_CORS_ORIGINS},LOG_LEVEL=${_LOG_LEVEL},RATE_LIMIT_ENABLED=true,RATE_LIMIT_PER_MINUTE=60'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=300'
      - '--port=8000'
      - '--execution-environment=gen2'
    waitFor: ['push']

  # Step 8: Cleanup test database
  - name: 'gcr.io/cloud-builders/docker'
    id: 'cleanup'
    entrypoint: 'sh'
    args:
      - '-c'
      - 'docker stop test-db && docker rm test-db || true'
    waitFor: ['test']

images:
  - '${_ARTIFACT_REGISTRY}/${_IMAGE_NAME}:${_TAG}'
  - '${_ARTIFACT_REGISTRY}/${_IMAGE_NAME}:latest'

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/${_SECRET_KEY}/versions/latest
      env: 'SECRET_KEY'
    - versionName: projects/${PROJECT_ID}/secrets/${_DATABASE_URL}/versions/latest
      env: 'DATABASE_URL'
    - versionName: projects/${PROJECT_ID}/secrets/${_REDIS_URL}/versions/latest
      env: 'REDIS_URL'

timeout: '1200s'
