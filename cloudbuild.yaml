steps:
# Step 1: Run unit and integration tests
- name: 'gcr.io/cloud-builders/docker'
  id: 'run-tests'
  args: ['build', '-t', 'josi-test', '-f', 'Dockerfile.test', '.']
  waitFor: ['-']

- name: 'josi-test'
  id: 'execute-tests'
  env:
    - 'DATABASE_URL=postgresql://josi:josi@test-db:5432/josi_test'
    - 'REDIS_URL=redis://test-redis:6379/1'
    - 'ENVIRONMENT=test'
  args: ['poetry', 'run', 'pytest', '-v', '--cov=src/josi', '--cov-fail-under=80', '--junitxml=test-results.xml', '--cov-report=xml']
  waitFor: ['run-tests']

# Step 2: Build application image
- name: 'gcr.io/cloud-builders/docker'
  id: 'build-app'
  args: [
    'build', 
    '--network=cloudbuild',
    '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_IMAGE_NAME}:${_TAG}',
    '.'
  ]
  waitFor: ['execute-tests']

# Step 3: Push image to registry
- name: 'gcr.io/cloud-builders/docker'
  id: 'push-image'
  args: [
    'push', 
    'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_IMAGE_NAME}:${_TAG}'
  ]
  waitFor: ['build-app']

# Step 4: Deploy to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'deploy'
  args:
  - gcloud
  - beta
  - run
  - deploy
  - ${_SERVICE_NAME}
  - --image=us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_IMAGE_NAME}:${_TAG}
  - --region=us-central1
  - --min-instances=1
  - --service-account=${_SA_EMAIL}
  - --set-secrets=SECRET_KEY=${_SECRET_KEY}:latest
  - --set-secrets=DATABASE_URL=${_DATABASE_URL}:latest
  - --set-secrets=REDIS_URL=${_REDIS_URL}:latest
  - --set-env-vars=APP_NAME=${_APP_NAME}
  - --set-env-vars=APP_VERSION=${_TAG}
  - --set-env-vars=ENVIRONMENT=${_ENVIRONMENT}
  - --set-env-vars=AUTO_DB_MIGRATION=true
  - --set-env-vars=EPHEMERIS_PATH=/usr/share/swisseph
  - --set-env-vars=CORS_ORIGINS=${_CORS_ORIGINS}
  - --set-env-vars=LOG_LEVEL=${_LOG_LEVEL}
  - --set-env-vars=RATE_LIMIT_ENABLED=true
  - --set-env-vars=RATE_LIMIT_PER_MINUTE=60
  - --memory=2Gi
  - --cpu=2
  - --timeout=300s
  - --execution-environment=gen2
  - --port=8000
  waitFor: ['push-image']

# Step 5: Update service annotations
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'update-annotations'
  args:
  - gcloud
  - run
  - services
  - update
  - ${_SERVICE_NAME}
  - --region=us-central1
  - --update-annotations=run.googleapis.com/cpu-throttling=false
  waitFor: ['deploy']

# Define service dependencies for parallel execution
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE

# Test database services
availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/${_SECRET_KEY}/versions/latest
    env: 'SECRET_KEY'
  - versionName: projects/$PROJECT_ID/secrets/${_DATABASE_URL}/versions/latest
    env: 'DATABASE_URL'
  - versionName: projects/$PROJECT_ID/secrets/${_REDIS_URL}/versions/latest
    env: 'REDIS_URL'

substitutions:
  _IMAGE_NAME: josi-api
  _SERVICE_NAME: ${_IMAGE_NAME}
  _ENVIRONMENT: production
  _TAG: ${SHORT_SHA}
  _APP_NAME: Josi API
  _SA_EMAIL: josi-sa@${PROJECT_ID}.iam.gserviceaccount.com
  _SECRET_KEY: josi-secret-key
  _DATABASE_URL: josi-database-url
  _REDIS_URL: josi-redis-url
  _CORS_ORIGINS: "*"
  _LOG_LEVEL: INFO

images: ['us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_IMAGE_NAME}:${_TAG}']

# Upload test results to Cloud Storage (optional)
artifacts:
  objects:
    location: 'gs://${PROJECT_ID}_cloudbuild/test-results/${BUILD_ID}'
    paths:
      - 'test-results.xml'
      - 'coverage.xml'