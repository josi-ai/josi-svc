services:
  db:
    image: pgvector/pgvector:pg16
    container_name: josi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: josi
      POSTGRES_PASSWORD: josi
      POSTGRES_DB: josi
    ports:
      - "1961:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U josi"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c shared_buffers=256MB
      -c max_connections=200
      -c log_statement=all
      -c log_duration=on

  # Test database (uses tmpfs for speed, only starts with --profile test)
  db-test:
    image: pgvector/pgvector:pg16
    container_name: josi-db-test
    environment:
      POSTGRES_USER: josi
      POSTGRES_PASSWORD: josi
      POSTGRES_DB: josi_test
    ports:
      - "1962:5432"
    tmpfs:
      - /var/lib/postgresql/data
    volumes:
      - ./src/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U josi"]
      interval: 5s
      timeout: 3s
      retries: 3
    profiles:
      - test

  redis:
    image: redis:7-alpine
    container_name: josi-redis
    restart: unless-stopped
    ports:
      - "1982:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: josi-api
    restart: unless-stopped
    ports:
      - "1954:8000"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://josi:josi@db:5432/josi
      REDIS_URL: redis://redis:6379/0
      AUTO_DB_MIGRATION: "True"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./alembic.ini:/app/alembic.ini
    command: poetry run uvicorn josi.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: josi-web
    restart: unless-stopped
    ports:
      - "1989:4000"
    env_file:
      - .env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:1954
      API_URL: http://api:8000
    depends_on:
      - api
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - /app/.next
    command: npm run dev

  # Database management UI (only starts with --profile tools)
  adminer:
    image: adminer:latest
    container_name: josi-adminer
    restart: unless-stopped
    ports:
      - "1980:8080"
    depends_on:
      - db
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:
  web_node_modules:
