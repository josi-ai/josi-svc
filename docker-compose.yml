services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: josi
      POSTGRES_PASSWORD: josi
      POSTGRES_DB: josi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U josi"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c shared_buffers=256MB
      -c max_connections=200
      -c log_statement=all
      -c log_duration=on

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://josi:josi@db:5432/josi
      REDIS_URL: redis://redis:6379/0
      AUTO_DB_MIGRATION: "True"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./alembic.ini:/app/alembic.ini
    command: poetry run uvicorn josi.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data: