services:
  db:
    image: pgvector/pgvector:pg16
    container_name: josi-db
    restart: unless-stopped
    profiles:
      - local
    command: >
      postgres
      -c shared_buffers=256MB
      -c max_connections=200
      -c log_statement=all
      -c log_duration=on

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  db-test:
    image: pgvector/pgvector:pg16
    container_name: josi-db-test
    environment:
      POSTGRES_USER: josi
      POSTGRES_PASSWORD: josi
      POSTGRES_DB: josi_test
    ports:
      - "1962:5432"
    tmpfs:
      - /var/lib/postgresql/data
    volumes:
      - ./src/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U josi"]
      interval: 5s
      timeout: 3s
      retries: 3
    profiles:
      - test

  cloudsql-proxy:
    container_name: josi-cloudsql-proxy
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.15.2
    restart: unless-stopped
    profiles:
      - cloud
    ports:
      - "15432:5432"

  api:
    build: .
    container_name: josi-api
    restart: unless-stopped
    ports:
      - "1954:8000"
    env_file:
      - .env.local
    environment:
      AUTO_DB_MIGRATION: "True"
      EPHEMERIS_PATH: /usr/share/swisseph
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./src:/app/src
      - ./alembic.ini:/app/alembic.ini
    depends_on:
      - redis
    command: poetry run uvicorn josi.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: josi-web
    restart: unless-stopped
    ports:
      - "1989:4000"
    env_file:
      - .env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:1954
      API_URL: http://api:8000
    depends_on:
      - api
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  redis_data:
  web_node_modules:
