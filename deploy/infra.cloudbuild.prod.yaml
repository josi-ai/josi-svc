# Cloud Build — Josi Infrastructure (Prod)
# Trigger: Branch ^main$, Included files: infra/**

substitutions:
  _STACK: govindnewform/prod

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/josiam-pulumi-access-token/versions/latest
      env: "PULUMI_ACCESS_TOKEN"

steps:
  - name: "python:3.12-slim"
    id: "pulumi-up"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        apt-get update -qq && apt-get install -y -qq curl > /dev/null
        curl -fsSL https://get.pulumi.com | sh
        export PATH="$$HOME/.pulumi/bin:$$PATH"
        cd infra
        python -m venv venv
        . venv/bin/activate
        pip install --quiet -r requirements.txt
        pulumi login
        pulumi stack select ${_STACK}
        pulumi up --yes --skip-preview
    secretEnv: ["PULUMI_ACCESS_TOKEN"]

timeout: "600s"
