# Cloud Build — Josi Web (Prod)
# Trigger: Branch ^main$, Included files: web/**

substitutions:
  _REGION: us-central1
  _ARTIFACT_REGISTRY: us-central1-docker.pkg.dev/${PROJECT_ID}/josi
  _SERVICE_NAME: josi-web-prod

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/josiam-clerk-publishable-key-prod/versions/latest
      env: "CLERK_PUBLISHABLE_KEY"

steps:
  # Get API URL
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "get-api-url"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        API_URL=$$(gcloud run services describe josi-api-prod \
          --region=${_REGION} --format='value(status.url)' 2>/dev/null || echo "")
        echo "$$API_URL" > /workspace/api_url.txt
        echo "API URL: $$API_URL"

  # Build
  - name: "gcr.io/cloud-builders/docker"
    id: "build"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        API_URL=$$(cat /workspace/api_url.txt)
        docker build \
          -t "${_ARTIFACT_REGISTRY}/josi-web:$COMMIT_SHA" \
          -t "${_ARTIFACT_REGISTRY}/josi-web:prod-latest" \
          --build-arg "NEXT_PUBLIC_API_URL=$$API_URL" \
          --build-arg "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$$CLERK_PUBLISHABLE_KEY" \
          -f web/Dockerfile \
          web/
    secretEnv: ["CLERK_PUBLISHABLE_KEY"]
    waitFor: ["get-api-url"]

  # Push
  - name: "gcr.io/cloud-builders/docker"
    id: "push"
    args: ["push", "--all-tags", "${_ARTIFACT_REGISTRY}/josi-web"]
    waitFor: ["build"]

  # Deploy
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image=${_ARTIFACT_REGISTRY}/josi-web:$COMMIT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--set-env-vars=NODE_ENV=production,CLERK_IS_SATELLITE=true,CLERK_DOMAIN=www.josiam.com,CLERK_SIGN_IN_URL=https://www.josiam.com/auth/login"
      - "--set-secrets=NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=josiam-clerk-publishable-key-prod:latest,CLERK_SECRET_KEY=josiam-clerk-secret-key-prod:latest"
      - "--min-instances=1"
      - "--max-instances=10"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--port=3000"
      - "--service-account=josi-prod@${PROJECT_ID}.iam.gserviceaccount.com"
    waitFor: ["push"]

images:
  - "${_ARTIFACT_REGISTRY}/josi-web:$COMMIT_SHA"
  - "${_ARTIFACT_REGISTRY}/josi-web:prod-latest"

timeout: "900s"
